  <body>
    <div id="root"></div>

    <script>
      /* ──────────────────────────────────────────────────────────────────
         DOM-PATCHER: runs after React has rendered
         – Replaces Twitter → Facebook (icon + label + href)
         – Updates all three social link hrefs
         – Wires "Get in Touch" button to mailto
      ────────────────────────────────────────────────────────────────── */

      // Facebook SVG path (official "f" logo)
      const FACEBOOK_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>`;

      const SOCIAL_MAP = {
        'twitter.com':  { href: 'https://www.facebook.com/share/18cfzAEYmV/',   label: 'Facebook', svg: FACEBOOK_SVG },
        'linkedin.com': { href: 'https://www.linkedin.com/in/gabriele-suthasiri-0156463b8?utm_source=share_via&utm_content=profile&utm_medium=member_android', label: 'LinkedIn', svg: null },
        'behance.net':  { href: 'https://www.behance.net/gabrielsuthasi',        label: 'Behance',  svg: null },
      };

      function patchDOM() {
        let patched = 0;

        /* ── 1. Social nav links ───────────────────────────── */
        document.querySelectorAll('a[href]').forEach(a => {
          const href = a.getAttribute('href') || '';
          for (const [key, info] of Object.entries(SOCIAL_MAP)) {
            if (href.includes(key)) {
              a.setAttribute('href', info.href);
              a.setAttribute('target', '_blank');
              a.setAttribute('rel', 'noopener noreferrer');

              // Replace Twitter icon + label with Facebook
              if (key === 'twitter.com') {
                // Swap SVG
                const svgEl = a.querySelector('svg');
                if (svgEl) {
                  const tmp = document.createElement('span');
                  tmp.innerHTML = info.svg;
                  const newSvg = tmp.firstElementChild;
                  if (svgEl.className) newSvg.setAttribute('class', svgEl.className);
                  svgEl.replaceWith(newSvg);
                }
                // Swap text label
                a.querySelectorAll('span').forEach(span => {
                  if (span.textContent.trim() === 'Twitter') {
                    span.textContent = 'Facebook';
                  }
                });
              }
              patched++;
            }
          }
        });

        /* ── 2. "Get in Touch" button → mailto ────────────── */
        document.querySelectorAll('button, a').forEach(el => {
          if (el.textContent.trim().toLowerCase().includes('get in touch')) {
            const tag = el.tagName.toLowerCase();
            if (tag === 'button') {
              el.style.cursor = 'pointer';
              // Avoid adding duplicate listeners
              if (!el.dataset.mailPatched) {
                el.dataset.mailPatched = '1';
                el.addEventListener('click', (e) => {
                  e.preventDefault();
                  window.location.href = 'mailto:gab.suthasiri@gmail.com';
                });
              }
            } else {
              el.setAttribute('href', 'mailto:gab.suthasiri@gmail.com');
            }
            patched++;
          }
        });

        return patched;
      }

      // React needs a tick to hydrate; poll until elements appear
      function tryPatch(attempts) {
        attempts = attempts || 0;
        const count = patchDOM();
        if (count === 0 && attempts < 40) {
          setTimeout(function() { tryPatch(attempts + 1); }, 150);
        }
      }

      // Re-patch whenever the DOM changes (covers SPA navigation)
      const observer = new MutationObserver(function() { patchDOM(); });

      window.addEventListener('DOMContentLoaded', function() {
        tryPatch(0);
        observer.observe(document.body, { childList: true, subtree: true });
      });
    </script>
  </body>
